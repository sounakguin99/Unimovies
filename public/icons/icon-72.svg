<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="72" height="72" rx="10.799999999999999" fill="url(#bg)"/>
  
  <!-- Glow circle behind play button -->
  <circle cx="36" cy="36" r="23.04" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="36" cy="36" r="25.2" fill="none" stroke="url(#accent)" stroke-width="1.44" opacity="0.8"/>
  
  <!-- Inner gradient circle -->
  <circle cx="36" cy="36" r="20.160000000000004" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Play button triangle -->
  <polygon points="29.52,25.200000000000003 48.96,36 29.52,46.8" fill="url(#accent)"/>
  
  <!-- Film strip holes - left side -->
  <rect x="5.76" y="24.48" width="4.32" height="4.32" rx="0.8640000000000001" fill="#3B82F6" opacity="0.5"/>
  <rect x="5.76" y="33.12" width="4.32" height="4.32" rx="0.8640000000000001" fill="#3B82F6" opacity="0.5"/>
  <rect x="5.76" y="41.76" width="4.32" height="4.32" rx="0.8640000000000001" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Film strip holes - right side -->
  <rect x="61.919999999999995" y="24.48" width="4.32" height="4.32" rx="0.8640000000000001" fill="#8B5CF6" opacity="0.5"/>
  <rect x="61.919999999999995" y="33.12" width="4.32" height="4.32" rx="0.8640000000000001" fill="#8B5CF6" opacity="0.5"/>
  <rect x="61.919999999999995" y="41.76" width="4.32" height="4.32" rx="0.8640000000000001" fill="#8B5CF6" opacity="0.5"/>
