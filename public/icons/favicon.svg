<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="4.8" fill="url(#bg)"/>
  
  <!-- Glow circle behind play button -->
  <circle cx="16" cy="16" r="10.24" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11.2" fill="none" stroke="url(#accent)" stroke-width="0.64" opacity="0.8"/>
  
  <!-- Inner gradient circle -->
  <circle cx="16" cy="16" r="8.96" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Play button triangle -->
  <polygon points="13.120000000000001,11.2 21.759999999999998,16 13.120000000000001,20.8" fill="url(#accent)"/>
  
  <!-- Film strip holes - left side -->
  <rect x="2.56" y="10.879999999999999" width="1.92" height="1.92" rx="0.384" fill="#3B82F6" opacity="0.5"/>
  <rect x="2.56" y="14.72" width="1.92" height="1.92" rx="0.384" fill="#3B82F6" opacity="0.5"/>
  <rect x="2.56" y="18.56" width="1.92" height="1.92" rx="0.384" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Film strip holes - right side -->
  <rect x="27.520000000000003" y="10.879999999999999" width="1.92" height="1.92" rx="0.384" fill="#8B5CF6" opacity="0.5"/>
  <rect x="27.520000000000003" y="14.72" width="1.92" height="1.92" rx="0.384" fill="#8B5CF6" opacity="0.5"/>
  <rect x="27.520000000000003" y="18.56" width="1.92" height="1.92" rx="0.384" fill="#8B5CF6" opacity="0.5"/>
</svg>