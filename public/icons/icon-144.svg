  <rect x="11.52" y="48.96" width="8.64" height="8.64" rx="1.7280000000000002" fill="#3B82F6" opacity="0.5"/>
  <rect x="11.52" y="66.24" width="8.64" height="8.64" rx="1.7280000000000002" fill="#3B82F6" opacity="0.5"/>
  <rect x="11.52" y="83.52" width="8.64" height="8.64" rx="1.7280000000000002" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Film strip holes - right side -->
