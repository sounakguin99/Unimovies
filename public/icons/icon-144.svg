<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="144" height="144" rx="21.599999999999998" fill="url(#bg)"/>
  
  <!-- Glow circle behind play button -->
  <circle cx="72" cy="72" r="46.08" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="72" cy="72" r="50.4" fill="none" stroke="url(#accent)" stroke-width="2.88" opacity="0.8"/>
  
  <!-- Inner gradient circle -->
  <circle cx="72" cy="72" r="40.32000000000001" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Play button triangle -->
  <polygon points="59.04,50.400000000000006 97.92,72 59.04,93.6" fill="url(#accent)"/>
  
