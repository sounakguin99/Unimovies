<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="96" height="96" rx="14.399999999999999" fill="url(#bg)"/>
  
  <!-- Glow circle behind play button -->
  <circle cx="48" cy="48" r="30.72" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="48" cy="48" r="33.599999999999994" fill="none" stroke="url(#accent)" stroke-width="1.92" opacity="0.8"/>
  
  <!-- Inner gradient circle -->
  <circle cx="48" cy="48" r="26.880000000000003" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Play button triangle -->
  <polygon points="39.36,33.6 65.28,48 39.36,62.4" fill="url(#accent)"/>
  
  <!-- Film strip holes - left side -->
  <rect x="7.68" y="32.64" width="5.76" height="5.76" rx="1.152" fill="#3B82F6" opacity="0.5"/>
  <rect x="7.68" y="44.16" width="5.76" height="5.76" rx="1.152" fill="#3B82F6" opacity="0.5"/>
  <rect x="7.68" y="55.68" width="5.76" height="5.76" rx="1.152" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Film strip holes - right side -->
  <rect x="82.55999999999999" y="32.64" width="5.76" height="5.76" rx="1.152" fill="#8B5CF6" opacity="0.5"/>
  <rect x="82.55999999999999" y="44.16" width="5.76" height="5.76" rx="1.152" fill="#8B5CF6" opacity="0.5"/>
  <rect x="82.55999999999999" y="55.68" width="5.76" height="5.76" rx="1.152" fill="#8B5CF6" opacity="0.5"/>
</svg>