<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="19.2" fill="url(#bg)"/>
  
  <!-- Glow circle behind play button -->
  <circle cx="64" cy="64" r="40.96" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="44.8" fill="none" stroke="url(#accent)" stroke-width="2.56" opacity="0.8"/>
  
  <!-- Inner gradient circle -->
  <circle cx="64" cy="64" r="35.84" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Play button triangle -->
  <polygon points="52.480000000000004,44.8 87.03999999999999,64 52.480000000000004,83.2" fill="url(#accent)"/>
  
  <!-- Film strip holes - left side -->
  <rect x="10.24" y="43.519999999999996" width="7.68" height="7.68" rx="1.536" fill="#3B82F6" opacity="0.5"/>
  <rect x="10.24" y="58.88" width="7.68" height="7.68" rx="1.536" fill="#3B82F6" opacity="0.5"/>
  <rect x="10.24" y="74.24" width="7.68" height="7.68" rx="1.536" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Film strip holes - right side -->
  <rect x="110.08000000000001" y="43.519999999999996" width="7.68" height="7.68" rx="1.536" fill="#8B5CF6" opacity="0.5"/>
  <rect x="110.08000000000001" y="58.88" width="7.68" height="7.68" rx="1.536" fill="#8B5CF6" opacity="0.5"/>
  <rect x="110.08000000000001" y="74.24" width="7.68" height="7.68" rx="1.536" fill="#8B5CF6" opacity="0.5"/>
