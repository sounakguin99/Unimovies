<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 384 384">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="384" height="384" rx="57.599999999999994" fill="url(#bg)"/>
  
  <!-- Glow circle behind play button -->
  <circle cx="192" cy="192" r="122.88" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="192" cy="192" r="134.39999999999998" fill="none" stroke="url(#accent)" stroke-width="7.68" opacity="0.8"/>
  
  <!-- Inner gradient circle -->
  <circle cx="192" cy="192" r="107.52000000000001" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Play button triangle -->
  <polygon points="157.44,134.4 261.12,192 157.44,249.6" fill="url(#accent)"/>
  
  <!-- Film strip holes - left side -->
  <rect x="30.72" y="130.56" width="23.04" height="23.04" rx="4.608" fill="#3B82F6" opacity="0.5"/>
  <rect x="30.72" y="176.64" width="23.04" height="23.04" rx="4.608" fill="#3B82F6" opacity="0.5"/>
  <rect x="30.72" y="222.72" width="23.04" height="23.04" rx="4.608" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Film strip holes - right side -->
  <rect x="330.23999999999995" y="130.56" width="23.04" height="23.04" rx="4.608" fill="#8B5CF6" opacity="0.5"/>
  <rect x="330.23999999999995" y="176.64" width="23.04" height="23.04" rx="4.608" fill="#8B5CF6" opacity="0.5"/>
  <rect x="330.23999999999995" y="222.72" width="23.04" height="23.04" rx="4.608" fill="#8B5CF6" opacity="0.5"/>
</svg>