<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="27" fill="url(#bg)"/>
  
  <!-- Glow circle behind play button -->
  <circle cx="90" cy="90" r="57.6" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Outer ring -->
  <circle cx="90" cy="90" r="62.99999999999999" fill="none" stroke="url(#accent)" stroke-width="3.6" opacity="0.8"/>
  
  <!-- Inner gradient circle -->
  <circle cx="90" cy="90" r="50.400000000000006" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Play button triangle -->
  <polygon points="73.8,63 122.4,90 73.8,117" fill="url(#accent)"/>
  
  <!-- Film strip holes - left side -->
  <rect x="14.4" y="61.2" width="10.799999999999999" height="10.799999999999999" rx="2.1599999999999997" fill="#3B82F6" opacity="0.5"/>
  <rect x="14.4" y="82.8" width="10.799999999999999" height="10.799999999999999" rx="2.1599999999999997" fill="#3B82F6" opacity="0.5"/>
  <rect x="14.4" y="104.4" width="10.799999999999999" height="10.799999999999999" rx="2.1599999999999997" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Film strip holes - right side -->
  <rect x="154.79999999999998" y="61.2" width="10.799999999999999" height="10.799999999999999" rx="2.1599999999999997" fill="#8B5CF6" opacity="0.5"/>
  <rect x="154.79999999999998" y="82.8" width="10.799999999999999" height="10.799999999999999" rx="2.1599999999999997" fill="#8B5CF6" opacity="0.5"/>
  <rect x="154.79999999999998" y="104.4" width="10.799999999999999" height="10.799999999999999" rx="2.1599999999999997" fill="#8B5CF6" opacity="0.5"/>
</svg>